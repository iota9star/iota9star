name: GitHub-Profile-Automation

on:
  schedule:
    # 策略: cron 每小时凭底触发 → 由脚本 --guard 门控决定是否真正消耗额度。
    # 这样即使某次触发因 Actions 抖动/失败错过, 后续小时还能补上; 同时保证
    # 只有"有效窗口起点"附近才会真正调用, 避免在高峰超预算时段浪费额度。
    #
    # 有效窗口起点 (北京, 即脚本 VALID_STARTS_BJ, 由 find_best_anchor() 求解):
    #   01:00  [01,06] 全非高峰     ┐
    #   06:00  [06,11] 全非高峰     │  严格每 5h 一个起点 (对齐套餐 5h 刷新)
    #   11:00  [11,16] 高峰 14-16   │  高峰段 [14,18] 共 4h 被精确切为 2h+2h
    #   16:00  [16,21] 高峰 16-18   │  两个高峰窗口各用满 2h 高峰预算, 零浪费
    #   21:00  [21,02] 全非高峰     ┘  (21→01 为不可避免的 4h 缺口, 落在深夜)
    # guard 容差 ±30 分钟, 抵消 Actions cron 的触发抖动。
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  automated-tasks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: run-automated-tasks
    steps:
      - uses: actions/checkout@v4

      - name: Guard — 判断此刻是否在有效用量窗口
        id: guard
        continue-on-error: true
        run: |
          # 设置北京时区, 让脚本读到正确的当前时刻
          export TZ="Asia/Shanghai"
          # 退出码 0 = RUN (有效窗口), 2 = SKIP (非有效窗口)
          if python scripts/verify_schedule.py --guard; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::GUARD=RUN, 当前时刻命中有效用量窗口"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GUARD=SKIP, 当前时刻不在有效窗口, 跳过额度消耗步骤"
          fi

      - name: Generate 3D Profile Contrib
        if: steps.guard.outputs.should_run == 'true'
        uses: yoshi389111/github-profile-3d-contrib@v0.9.1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          MAX_REPOS: 999

      - name: Generate README with Claude Code Action
        if: steps.guard.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          claude_args: --allowedTools Write,Edit,Read,Glob,Grep,Bash(python\:scripts/generate_masonry.py\ *),Bash(curl\ *)
          prompt: |
            You are a creative GitHub profile designer. Generate a fresh, engaging README.md from the profile.md data.

            ## Step 1: Data Collection
            1. Read profile.md for personal info (content before <!-- REPOS -->)
            2. Extract repo links from <!-- REPOS --> section
            3. Pass repos to Python script (it will fetch stars and sort automatically)

            ## Step 2: Generate Masonry Layout
            **CRITICAL**: Use the Python masonry tool to generate SVG cards:

            ```bash
            python scripts/generate_masonry.py owner/repo1 owner/repo2 owner/repo3 ...
            ```

            The tool will:
            - Fetch star counts via gh CLI automatically
            - Sort repos by popularity (stars descending)
            - Download SVG files to cards/ directory
            - Output Markdown with local SVG references (GitHub renders SVGs natively)

            The output format is:
            ```markdown
            [![](cards/owner_repo.svg)](https://github.com/owner/repo)
            [![](cards/owner_repo2.svg)](https://github.com/owner/repo2)
            ...
            ```

            ## Step 3: Generate README Content

            **Core Requirements:**
            - Use the HTML output from Python tool for masonry layout
            - Include rich, diverse content sections
            - Write in English
            - Use compact spacing (single blank lines)
            - Add 10-20+ emojis for visual engagement
            - NO horizontal separators (---) anywhere in the document

            **Suggested Sections:**
            - 👨‍💻 About Me (detailed introduction with personality)
            - 🎯 What I Do (focus areas and expertise)
            - 🛠️ Tech Stack (expand from profile.md with emoji badges)
            - 📊 Quick Stats (repos, stars, contributions)
            - 🔥 Featured Projects (the masonry layout goes here)
            - 💡 Quote (fetch from https://v1.hitokoto.cn/)
            - 🏆 Highlights / Achievements
            - 📧 Connect (social links)
            - 💭 Philosophy / Approach

            **Masonry Layout:**
            The Python tool generates Markdown with SVG file references. Use its output directly in the Featured Projects section. GitHub will render the SVG files natively.


            **Markdown Formatting Rules:**
            - Line breaks within paragraph: end line with TWO SPACES + Enter
            - Paragraph breaks: use blank line (double Enter)
            - Lists: each item on new line with proper indentation
            - Code blocks: use triple backticks with language identifier
            - Links: [text](url) format
            - Images: ![alt](url) format
            - NO raw HTML for formatting (use markdown syntax)
            - Single blank lines between sections (not double)

            **Visual Style:**
            - Rich content with 5-7+ substantive sections
            - Colorful with 10-20+ emojis
            - Professional yet personality-filled
            - Information-dense but easy to scan

            **CRITICAL: After generating content, use the Write tool to save it to README.md.**

          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.CLAUDE_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.CLAUDE_API_BASE_URL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ secrets.CLAUDE_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ secrets.CLAUDE_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ secrets.CLAUDE_MODEL }}
          ANTHROPIC_REASONING_MODEL: ${{ secrets.CLAUDE_MODEL }}

      - name: Commit & Push All Changes
        if: steps.guard.outputs.should_run == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Automated update of GitHub profile README.md'
          commit_user_name: github-actions
          commit_user_email: github-actions@github.com
